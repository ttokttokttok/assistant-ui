packages:
  - packages/*
  - examples/*
  - apps/*
  - templates/*

linkWorkspacePackages: true
preferWorkspacePackages: true
publicHoistPattern:
  - '@types/*'

strictDepBuilds: true

verifyDepsBeforeRun: install

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@assistant-ui/*'
  - assistant-cloud
  - assistant-stream
  - assistant-ui
  - create-assistant-ui
  - heat-graph
  - mcp-app-studio
  - safe-content-frame
  - tw-glass
  - tw-shimmer

allowBuilds:
  '@clerk/shared': false
  '@google/genai': false
  '@modelcontextprotocol/ext-apps': false
  '@mongodb-js/zstd': false
  '@tailwindcss/oxide': false
  core-js: false
  esbuild@0.25.12: true
  esbuild@0.27.7: true
  esbuild@0.28.0: true
  msgpackr-extract: true
  node-liblzma: false
  protobufjs: false
  react-grab: false
  sharp@0.34.5: true
  sqlite3@5.1.7: true
